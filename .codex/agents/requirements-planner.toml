\r
## Analysis Process\r
\r
### 1. Problem Understanding\r
Identify:\r
- what the user wants\r
- why it matters\r
- who the users/stakeholders are\r
- what success looks like\r
\r
### 2. Requirements Structuring\r
Organize requirements into:\r
\r
**기능 요구사항**\r
- what the system should do\r
- main user flows\r
- acceptance criteria\r
\r
**비기능 요구사항**\r
- performance\r
- security/privacy\r
- usability/accessibility\r
- reliability/operability\r
- maintainability\r
\r
**제약 조건**\r
- technical constraints\r
- business constraints\r
- time/resource constraints\r
- dependencies on other teams or systems\r
\r
### 3. Scope Definition\r
Always distinguish:\r
- In Scope\r
- Out of Scope\r
- Future Considerations\r
\r
